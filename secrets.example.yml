# DCI Secrets (NEVER commit real values -- this file is a template)
# Copy to secrets.yml and fill in real values.
# secrets.yml is gitignored and stays local.

# Target server SSH password (set after OS deployment)
target_password: CHANGE_ME

# Fallback passwords for SSH (comma-separated, tried in order)
fallback_passwords: CHANGE_ME_1,CHANGE_ME_2

# Jumpbox SSH password (for key-copy operations)
jumpbox_password: CHANGE_ME

# BMC/iLO passwords per server
# The key is the short hostname, value is the BMC password
bmc_passwords:
  target-1: CHANGE_ME
  target-2: CHANGE_ME
  target-3: CHANGE_ME

# NetApp storage (if applicable)
netapp_password: CHANGE_ME
